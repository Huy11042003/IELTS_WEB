<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select Reading Test</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#1976d2;
    color:white;
    padding:16px 24px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:800px;
    margin:30px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:24px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.test-list{
    display:grid;
    gap:12px;
}

.test-item{
    padding:16px;
    border:2px solid #ddd;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

.test-item:hover{
    border-color:#1976d2;
    background:#e3f2fd;
}

.test-name{
    font-weight:bold;
    font-size:18px;
}

.test-time{
    color:#666;
    margin-top:4px;
}

.loading{
    text-align:center;
    padding:40px;
    color:#777;
}
</style>

</head>
<body>

<div class="header">
    📖 IELTS Reading Practice
</div>

<div class="container">

    <div class="card">

        <div class="title">
            Select Reading Test
        </div>

        <div id="testList" class="test-list">
            <div class="loading">Loading...</div>
        </div>

    </div>

</div>

<script>

fetch("reading-list.json")
.then(res => res.json())
.then(data => {

    const container =
        document.getElementById("testList");

    container.innerHTML = "";

    data.forEach(test => {

        const div =
            document.createElement("div");

        div.className = "test-item";

        div.innerHTML = `
            <div class="test-name">
                ${test.title}
            </div>

            <div class="test-time">
                Time Limit:
                ${Math.floor(test.timeLimit / 60)}
                minutes
            </div>
        `;

        div.addEventListener("click", () => {

            window.location.href =
                "reading.html?test=" +
                encodeURIComponent(test.id);
        });

        container.appendChild(div);
    });

})
.catch(error => {

    document.getElementById("testList")
        .innerHTML =
        "<div class='loading'>Unable to load tests.</div>";

    console.error(error);
});

</script>

</body>
</html>
