<!DOCTYPE html>
<html>
<head>
  <title>IELTS Reading Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-left-group">
    <div class="header-title">📖 IELTS Reading Test</div>
  </div>

  <div class="header-center-group">
    <button id="startButton" class="start-button" disabled>
      Start test
    </button>
  </div>

  <div class="header-right-group">
    <button id="submitButton" class="submit-button" disabled>
      Submit
    </button>
    <div class="timer" id="timer">--:--</div>
    <a href="index.html" class="header-close" id="closeReading">✕</a>
  </div>
</div>

<div class="main">

  <div class="left-panel">
    <iframe id="pdfViewer"></iframe>
  </div>

  <div class="right-panel">
    <div class="instruction-box">
      Questions panel
    </div>

    <div id="questionArea"></div>
  </div>

</div>

<div class="footer-nav" id="questionNav"></div>

<script>
  window.READING_TEST_ID =
    new URLSearchParams(window.location.search).get("test");

  if (!window.READING_TEST_ID) {
    alert("Test not found.");
    window.location.href = "select-test.html";
  }

  (function () {
    var closeBtn = document.getElementById("closeReading");

    if (closeBtn) {
      closeBtn.addEventListener("click", function (e) {
        var leave = confirm(
          "Are you sure you want to leave this test? Your answers and time will be lost."
        );

        if (!leave) {
          e.preventDefault();
        }
      });
    }

    window.onbeforeunload = function (e) {
      var message =
        "Are you sure you want to leave this test? Your answers and time will be lost.";

      e = e || window.event;

      if (e) {
        e.returnValue = message;
      }

      return message;
    };
  })();
</script>

<script src="script.js"></script>
</body>
</html>
